<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Blades & Blasters</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GitHub Pages returns a 404 for a deep route (e.g. /classes/jedi-knight),
      // it serves this file instead. We encode the full path into a query string
      // and redirect to the root so React Router can handle it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
