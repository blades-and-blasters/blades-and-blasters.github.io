<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Blades & Blasters</title>
    <script>
      // Preserve the requested path and redirect to index.html
      const path = window.location.pathname;
      const basePath = '/ruleset/';
      
      // Only redirect if we're in the ruleset subdirectory
      if (path.startsWith(basePath)) {
        sessionStorage.redirect = window.location.href;
        window.location.href = basePath + 'index.html';
      }
    </script>
  </head>
  <body>
  </body>
</html>
